apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: {{.Namespace}}
    app.kubernetes.io/name: {{.Name}}
    app.kubernetes.io/version: 3.1.8
    app.kubernetes.io/component: dolphinscheduler
  name: {{.Name}}
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{.Namespace}}
      app.kubernetes.io/name: {{.Name}}
      app.kubernetes.io/version: 3.1.8
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{.Namespace}}
        app.kubernetes.io/name: {{.Name}}
        app.kubernetes.io/version: 3.1.8
        app.kubernetes.io/component: dolphinscheduler
    spec:
      containers:
      - env:
        - name: DATABASE
          value: mysql
        - name: SPRING_PROFILES_ACTIVE
          value: mysql
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql.{{.Namespace}}.svc.cluster.local:3306/dolphinscheduler?useUnicode=true&characterEncoding=UTF-8&useSSL=false
        - name: SPRING_DATASOURCE_USERNAME
          value: dolphinscheduler
        - name: SPRING_DATASOURCE_PASSWORD
          value: 3mxM6DS_7iEpEvP
        image: library/dolphinscheduler:3.1.8
        imagePullPolicy: Always
        name: container-gjhv9l
        ports:
        - containerPort: 12345
          name: http-0
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /dolphinscheduler/ui/login
            port: 12345
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/localtime
          name: host-time
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /etc/localtime
          type: ""
        name: host-time
