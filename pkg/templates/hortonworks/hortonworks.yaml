apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: {{.Namespace}}
    app.kubernetes.io/name: {{.Name}}
    app.kubernetes.io/version: 0.5.4
    app.kubernetes.io/component: hortonworks
  name: {{.Name}}
  namespace: {{.Namespace}}
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{.Namespace}}
      app.kubernetes.io/name: {{.Name}}
      app.kubernetes.io/version: 0.5.4
      app.kubernetes.io/component: hortonworks
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{.Namespace}}
        app.kubernetes.io/name: {{.Name}}
        app.kubernetes.io/version: 0.5.4
        app.kubernetes.io/component: hortonworks
    spec:
      containers:
      - image: library/hortonworks:0.5.4
        imagePullPolicy: Always
        name: container-nm2r2e
        ports:
        - containerPort: 9090
          hostPort: 9090
          name: tcp-0
          protocol: TCP
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/localtime
          name: host-time
          readOnly: true
        - mountPath: /opt/hortonworks-registry-0.5.4/conf/registry.yaml
          name: {{.Name}}
          readOnly: true
          subPath: registry.yaml
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /etc/localtime
          type: ""
        name: host-time
      - configMap:
          defaultMode: 420
          items:
          - key: registry.yaml
            path: registry.yaml
          name: {{.Name}}
        name: {{.Name}}