apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: {{.Namespace}}
    app.kubernetes.io/name: {{.Name}}
    app.kubernetes.io/version: 0.5.4
    app.kubernetes.io/component: hortonworks
  name: {{.Name}}-nodeport
  namespace: {{.Namespace}}
spec:
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: tcp-0
    port: 9090
    protocol: TCP
    targetPort: 9090
    nodePort: 30887
  selector:
    app.kubernetes.io/instance: {{.Namespace}}
    app.kubernetes.io/name: {{.Name}}
    app.kubernetes.io/version: 0.5.4
    app.kubernetes.io/component: hortonworks
  sessionAffinity: None
  type: NodePort